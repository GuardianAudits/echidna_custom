name: "Nix and release"
on:
  workflow_dispatch:
    inputs:
      hevm_repository:
        description: "hevm repository (owner/repo)"
        required: true
        default: "r0bert-ethack/hevm_custom"
      hevm_ref:
        description: "hevm git ref (branch/tag/sha)"
        required: true
        default: "main"

jobs:
  nixBuild:
    name: Build ${{ matrix.name }} binary
    timeout-minutes: ${{ matrix.timeout || 30 }}
    runs-on: ${{ matrix.runner }}
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    strategy:
      matrix:
        include:
          - name: Linux (x86_64)
            tuple: x86_64-linux
            system: x86_64-linux
            timeout: 180
            runner: ubuntu-24.04
          - name: Linux (aarch64)
            tuple: aarch64-linux
            system: aarch64-linux
            timeout: 180
            runner: ubuntu-24.04-arm
          - name: macOS (x86_64)
            tuple: x86_64-macos
            system: x86_64-darwin
            timeout: 240
            runner: macos-15
          - name: macOS (aarch64)
            tuple: aarch64-macos
            system: aarch64-darwin
            timeout: 240
            runner: macos-15
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Checkout hevm
        uses: actions/checkout@v6
        with:
          repository: ${{ inputs.hevm_repository }}
          ref: ${{ inputs.hevm_ref }}
          path: hevm-src
          fetch-depth: 1
          token: ${{ secrets.HEVM_CHECKOUT_TOKEN || github.token }}

      - name: Install Rosetta
        if: matrix.system == 'x86_64-darwin'
        run: sudo softwareupdate --install-rosetta --agree-to-license

      - name: Install Nix
        if: matrix.system != 'x86_64-darwin'
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Install Nix (x86_64-darwin via Apple Silicon host)
        if: matrix.system == 'x86_64-darwin'
        uses: DeterminateSystems/nix-installer-action@v21
        with:
          extra-conf: |
            extra-platforms = x86_64-darwin aarch64-darwin

      - name: Configure Cachix
        uses: cachix/cachix-action@v16
        with:
          name: trailofbits
          authToken: ${{ secrets.CACHIX_AUTH_TOKEN }}
          pushFilter: "(-echidna-.+$)"

      - name: Obtain version number
        id: version
        run: |
          if [[ "$GIT_REF" =~ ^refs/tags/v.* ]]; then
            echo "version=$(echo "$GIT_REF" | sed 's#^refs/tags/v##')" >> "$GITHUB_OUTPUT"
          else
            echo "version=HEAD-$(echo "$GIT_SHA" | cut -c1-7)" >> "$GITHUB_OUTPUT"
          fi
        env:
          GIT_REF: ${{ github.ref }}
          GIT_SHA: ${{ github.sha }}

      - name: Build redistributable echidna
        env:
          HEVM_SRC: ${{ github.workspace }}/hevm-src
          NIX_SYSTEM: ${{ matrix.system }}
        run: |
          nix build ".#packages.${NIX_SYSTEM}.echidna-redistributable" --out-link redistributable --impure
          tar -czf "echidna-${{ steps.version.outputs.version }}-${{ matrix.tuple }}.tar.gz" -C ./redistributable/bin/ echidna

      - name: Upload artifact
        uses: actions/upload-artifact@v6
        with:
          name: echidna-redistributable-${{ matrix.tuple }}
          path: echidna-${{ steps.version.outputs.version }}-${{ matrix.tuple }}.tar.gz

  release:
    name: Create release
    timeout-minutes: 10
    needs: [nixBuild]
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Download binaries
        uses: actions/download-artifact@v7
        with:
          pattern: echidna-redistributable-*
          merge-multiple: true

      - name: Sign binaries
        uses: sigstore/gh-action-sigstore-python@v3.2.0
        with:
          inputs: ./echidna-*.tar.gz

      - name: Create GitHub release and upload binaries
        uses: softprops/action-gh-release@v2.5.0
        with:
          draft: true
          name: "Echidna ${{ needs.nixBuild.outputs.version }}"
          files: |
            ./echidna-*.tar.gz
            ./echidna-*.tar.gz.sigstore.json
