name: "Build All Platforms (GitHub-hosted)"

on:
  workflow_dispatch:
    inputs:
      hevm_repository:
        description: "hevm repository (owner/repo)"
        required: true
        default: "argotorg/hevm"
      hevm_ref:
        description: "hevm git ref (branch/tag/sha)"
        required: true
        default: "main"

permissions:
  contents: read

jobs:
  build:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 240
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Linux (x86_64)
            tuple: x86_64-linux
            system: x86_64-linux
            runner: ubuntu-24.04
          - name: Linux (aarch64)
            tuple: aarch64-linux
            system: aarch64-linux
            runner: ubuntu-24.04-arm
          - name: macOS (x86_64)
            tuple: x86_64-macos
            system: x86_64-darwin
            runner: macos-14
          - name: macOS (aarch64)
            tuple: aarch64-macos
            system: aarch64-darwin
            runner: macos-14

    steps:
      - name: Checkout echidna
        uses: actions/checkout@v4

      - name: Checkout hevm
        uses: actions/checkout@v4
        with:
          repository: ${{ inputs.hevm_repository }}
          ref: ${{ inputs.hevm_ref }}
          path: hevm-src
          fetch-depth: 1
          token: ${{ secrets.HEVM_CHECKOUT_TOKEN || github.token }}

      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v21

      - name: Configure Cachix (pull-only)
        uses: cachix/cachix-action@v16
        with:
          name: trailofbits

      - name: Resolve version
        id: version
        shell: bash
        run: |
          echo "value=HEAD-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"

      - name: Build redistributable echidna
        env:
          HEVM_SRC: ${{ github.workspace }}/hevm-src
        run: |
          nix build --impure ".#packages.${{ matrix.system }}.echidna-redistributable" --out-link redistributable
          file ./redistributable/bin/echidna
          ldd ./redistributable/bin/echidna || otool -L ./redistributable/bin/echidna || true

      - name: Pack artifact
        id: pack
        shell: bash
        run: |
          tarball="echidna-${{ steps.version.outputs.value }}-${{ matrix.tuple }}.tar.gz"
          tar -czf "$tarball" -C ./redistributable/bin echidna
          echo "tarball=$tarball" >> "$GITHUB_OUTPUT"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: echidna-redistributable-${{ matrix.tuple }}
          path: ${{ steps.pack.outputs.tarball }}
