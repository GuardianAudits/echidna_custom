name: Build Custom Echidna

on:
  workflow_dispatch:
  push:
    branches: [ main, master ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - name: Checkout echidna
        uses: actions/checkout@v4

      - name: Checkout hevm (custom)
        uses: actions/checkout@v4
        with:
          repository: r0bert-ethack/hevm_custom
          path: hevm

      - name: Install Nix
        uses: nixbuild/nix-quick-install-action@v34

      - name: Nix cache
        uses: nix-community/cache-nix-action@v7
        with:
          primary-key: nix-build-${{ runner.os }}-${{ hashFiles('**/*.nix', '**/flake.lock') }}
          purge: true
          purge-prefixes: nix-build-${{ runner.os }}-
          purge-created: 0
          purge-primary-key: never
          gc-max-store-size: 1G

      - name: Build echidna (custom hevm)
        env:
          HEVM_SRC: ${{ github.workspace }}/hevm
        run: nix build .#echidna --impure -L --keep-going

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: echidna-macos
          path: result/bin/echidna
