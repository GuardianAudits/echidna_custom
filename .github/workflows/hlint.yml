name: HLint

on:
  workflow_dispatch:

jobs:
  hlint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: HLint
        run: |
          nix-shell -p hlint --command 'hlint lib src'
